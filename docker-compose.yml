services:
  postgres:
    image: postgres:16-alpine
    container_name: cotaseguro-postgres
    environment:
      POSTGRES_DB: cotaseguro
      POSTGRES_USER: cotaseguro
      POSTGRES_PASSWORD: cotaseguro
    ports:
      - "5440:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cotaseguro -d cotaseguro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
