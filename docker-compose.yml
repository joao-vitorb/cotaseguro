services:
  postgres:
    image: postgres:16-alpine
    container_name: cotaseguro-postgres
    environment:
      POSTGRES_DB: cotaseguro
      POSTGRES_USER: cotaseguro
      POSTGRES_PASSWORD: cotaseguro
    ports:
      - "5440:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cotaseguro -d cotaseguro"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cotaseguro-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cotaseguro
      RABBITMQ_DEFAULT_PASS: cotaseguro
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
  rabbitmq-data:
