services:
  app:
    build: .
    image: cotaseguro:latest
    container_name: cotaseguro-app
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8088
      DB_URL: jdbc:postgresql://postgres:5432/cotaseguro
      DB_USERNAME: cotaseguro
      DB_PASSWORD: cotaseguro
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: cotaseguro
      RABBITMQ_PASSWORD: cotaseguro
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-me-in-real-deployments-0123456789abcdef
    ports:
      - "8088:8088"

  postgres:
    image: postgres:16-alpine
    container_name: cotaseguro-postgres
    environment:
      POSTGRES_DB: cotaseguro
      POSTGRES_USER: cotaseguro
      POSTGRES_PASSWORD: cotaseguro
    ports:
      - "5440:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cotaseguro -d cotaseguro"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cotaseguro-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cotaseguro
      RABBITMQ_DEFAULT_PASS: cotaseguro
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cotaseguro-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
