spring:
  application:
    name: cotaseguro
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  web:
    locale: en
    locale-resolver: fixed
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5440/cotaseguro}
    username: ${DB_USERNAME:cotaseguro}
    password: ${DB_PASSWORD:cotaseguro}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USERNAME:cotaseguro}
    password: ${RABBITMQ_PASSWORD:cotaseguro}
    listener:
      simple:
        default-requeue-rejected: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
  cache:
    type: redis

server:
  port: ${SERVER_PORT:8088}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-secret-change-me-please-0123456789abcdef}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    rate-limit:
      login:
        enabled: ${LOGIN_RATE_LIMIT_ENABLED:true}
        max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
        window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: cotaseguro

info:
  app:
    name: CotaSeguro
    description: Insurance quotation and policy issuance REST API
