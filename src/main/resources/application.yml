spring:
  application:
    name: cotaseguro
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
