spring:
  application:
    name: cotaseguro
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  web:
    locale: en
    locale-resolver: fixed
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5440/cotaseguro}
    username: ${DB_USERNAME:cotaseguro}
    password: ${DB_PASSWORD:cotaseguro}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8088}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-secret-change-me-please-0123456789abcdef}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
